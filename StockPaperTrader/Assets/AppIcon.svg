<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1024 1024">
  <defs>
    <linearGradient id="bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#1a1a2e"/>
      <stop offset="100%" style="stop-color:#16213e"/>
    </linearGradient>
    <linearGradient id="line" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" style="stop-color:#00d2ff"/>
      <stop offset="100%" style="stop-color:#3a7bd5"/>
    </linearGradient>
    <linearGradient id="glow" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#00d2ff;stop-opacity:0.3"/>
      <stop offset="100%" style="stop-color:#3a7bd5;stop-opacity:0"/>
    </linearGradient>
  </defs>
  <!-- Background -->
  <rect width="1024" height="1024" rx="224" fill="url(#bg)"/>
  <!-- Grid lines -->
  <g stroke="#ffffff" stroke-opacity="0.06" stroke-width="1.5">
    <line x1="160" y1="300" x2="864" y2="300"/>
    <line x1="160" y1="450" x2="864" y2="450"/>
    <line x1="160" y1="600" x2="864" y2="600"/>
    <line x1="160" y1="750" x2="864" y2="750"/>
  </g>
  <!-- Glow area under chart -->
  <path d="M200 700 L320 580 L440 620 L560 420 L680 350 L800 280 L800 750 L200 750 Z" fill="url(#glow)"/>
  <!-- Chart line -->
  <polyline points="200,700 320,580 440,620 560,420 680,350 800,280"
    fill="none" stroke="url(#line)" stroke-width="12" stroke-linecap="round" stroke-linejoin="round"/>
  <!-- Data points -->
  <circle cx="200" cy="700" r="10" fill="#00d2ff"/>
  <circle cx="320" cy="580" r="10" fill="#00d2ff"/>
  <circle cx="440" cy="620" r="10" fill="#00d2ff"/>
  <circle cx="560" cy="420" r="12" fill="#00d2ff"/>
  <circle cx="680" cy="350" r="10" fill="#3a7bd5"/>
  <circle cx="800" cy="280" r="14" fill="#3a7bd5"/>
  <circle cx="800" cy="280" r="24" fill="#3a7bd5" fill-opacity="0.3"/>
  <!-- Arrow up -->
  <g transform="translate(780, 180)">
    <polygon points="30,0 60,40 45,40 45,70 15,70 15,40 0,40" fill="#00e676"/>
  </g>
  <!-- Dollar sign -->
  <text x="200" y="260" font-family="SF Pro Display, Helvetica, Arial" font-size="120" font-weight="bold" fill="#ffffff" fill-opacity="0.9">$</text>
</svg>
